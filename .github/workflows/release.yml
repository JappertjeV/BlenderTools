name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build with PyInstaller
        run: pyinstaller BlenderTools.spec

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir dmg_stage
          cp -r dist/BlenderTools.app dmg_stage/
          ln -s /Applications dmg_stage/Applications
          hdiutil create \
            -volname "BlenderTools" \
            -srcfolder dmg_stage \
            -ov \
            -format UDZO \
            "BlenderTools-${VERSION}.dmg"
          echo "ASSET=BlenderTools-${VERSION}.dmg" >> $GITHUB_ENV

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download Caesium CLI for Windows
        shell: pwsh
        run: |
          $url = "https://github.com/Lymphatus/caesium-clt/releases/download/v1.2.0/caesiumclt-v1.2.0-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $url -OutFile caesiumclt-win.zip
          Expand-Archive -Path caesiumclt-win.zip -DestinationPath caesiumclt-win
          New-Item -ItemType Directory -Force -Path bin\win | Out-Null
          Copy-Item (Get-ChildItem caesiumclt-win -Recurse -Filter "caesiumclt.exe").FullName bin\win\caesiumclt.exe

      - name: Build with PyInstaller
        run: pyinstaller BlenderTools.spec

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Patch version in installer script
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $content = Get-Content installer\BlenderTools.iss -Raw
          $content = $content -replace 'AppVersion=[\d.]+', "AppVersion=$version"
          $content = $content -replace 'OutputBaseFilename=[\w.-]+', "OutputBaseFilename=BlenderTools-Setup-$version"
          Set-Content installer\BlenderTools.iss $content

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\installer | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\BlenderTools.iss

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/installer/BlenderTools-Setup-*.exe
